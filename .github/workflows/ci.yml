name: Build, Push and Deploy Look-alike Docker Image

on:
  push:
    branches:
      - main # main 브랜치 업데이트 시 자동 빌드 배포

jobs:
  build-push-and-deploy:
    runs-on: self-hosted
    
    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        
      - name: Docker Buildx 설정 (캐싱 및 멀티 플랫폼 빌드 지원)
        uses: docker/setup-buildx-action@v3
        
      - name: 속도 최적화 로컬 Docker 빌드 (15분 배포 속도 단축)
        run: docker build -t lookalike-mlops:latest .

      - name: 기존 로컬 컨테이너 중지 및 삭제
        run: |
          docker stop lookalike-api || true
          docker rm lookalike-api || true
          
      - name: 새로운 컨테이너 로컬 머신에서 포트 8001로 실행
        run: |
          docker run -d \
            --name lookalike-api \
            -p 8001:8000 \
            --restart unless-stopped \
            lookalike-mlops:latest
