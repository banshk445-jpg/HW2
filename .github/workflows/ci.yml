name: Build, Push and Deploy Look-alike Docker Image

on:
  push:
    branches:
      - main # main 브랜치 업데이트 시 자동 빌드 배포

jobs:
  build-push-and-deploy:
    runs-on: self-hosted
    
    steps:
      - name: 저장소 코드 체크아웃
        uses: actions/checkout@v4
        
      - name: Docker Buildx 설정 (캐싱 및 멀티 플랫폼 빌드 지원)
        uses: docker/setup-buildx-action@v3
        
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lookalike-mlops:latest

      - name: 기존 로컬 컨테이너 중지 및 삭제
        run: |
          docker stop lookalike-api || true
          docker rm lookalike-api || true
          
      - name: 최신 이미지 로컬로 풀(Pull)
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lookalike-mlops:latest
        
      - name: 새로운 컨테이너 로컬 머신에서 포트 8000으로 실행
        run: |
          docker run -d \
            --name lookalike-api \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/lookalike-mlops:latest
