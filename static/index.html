<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 닮은꼴 찾기 (Look-alike Finder)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="glass-container main-card">
        <header>
            <h1 class="gradient-text">Who is Your Twin?</h1>
            <p>AI가 분석하는 나의 연예인 닮은꼴</p>
        </header>

        <main>
            <!-- 업로드 영역 -->
            <div id="upload-section" class="upload-area active">
                <input type="file" id="file-input" accept="image/*, .png, .jpg, .jpeg, .heic, .heif, .webp" hidden>
                <label for="file-input" class="upload-label" id="drop-zone">
                    <div class="upload-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                        </svg>
                    </div>
                    <span>클릭하거나 사진을 드래그하여 업로드</span>
                </label>
            </div>

            <!-- 미리보기 & 로딩 영역 -->
            <div id="preview-section" class="preview-area hidden">
                <div class="image-wrapper">
                    <img id="preview-image" src="" alt="Preview">
                    <div id="scanning-effect" class="scanner"></div>
                </div>
                <div id="loading-text" class="loading-text hidden">
                    AI가 얼굴을 분석하고 있습니다<span class="dots">...</span>
                </div>
                <button id="analyze-btn" class="analyze-btn">닮은꼴 찾기</button>
                <button id="reset-btn" class="text-btn hidden">다시하기</button>
            </div>

            <!-- 결과 영역 -->
            <div id="result-section" class="result-area hidden">
                <div class="result-card">
                    <div class="match-badge">매칭 완료!</div>
                    <h2 class="match-name" id="match-name">박보검</h2>
                    <div class="similarity-bar-container">
                        <div class="similarity-label">일치율: <span id="similarity-value">98.5</span>%</div>
                        <div class="similarity-bar">
                            <div class="similarity-fill" id="similarity-fill"></div>
                        </div>
                    </div>
                </div>
                <button id="try-again-btn" class="analyze-btn outline">다른 사진으로 테스트</button>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
